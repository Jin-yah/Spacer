<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spacer Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <header>
      <div class="logo" aria-hidden="true">⎵</div>
      <h1>Spacer</h1>
    </header>

    <!-- ── Keybind ── -->
    <section class="setting-group">
      <span class="setting-label">Visualize Key</span>
      <div class="keybind-row">
        <div id="keyDisplay" class="key-badge">Shift</div>
        <button id="changeKeyBtn" class="btn-secondary">Change</button>
      </div>
      <p id="keyHint" class="hint capturing-hint" hidden>
        Press any key &nbsp;·&nbsp; <kbd>Esc</kbd> to cancel
      </p>
    </section>

    <!-- ── Space limit ── -->
    <section class="setting-group">
      <div class="toggle-row">
        <div>
          <span class="setting-label">Limit Consecutive Spaces</span>
          <p class="hint">Holding the visualize key always bypasses this limit.</p>
        </div>
        <label class="toggle" title="Toggle space limit">
          <input type="checkbox" id="limitToggle" />
          <span class="slider"></span>
        </label>
      </div>

      <div id="maxSpacesRow" class="max-spaces-row disabled">
        <label class="hint" for="maxSpacesInput">Max spaces in a row</label>
        <input
          type="number"
          id="maxSpacesInput"
          class="number-input"
          min="1"
          max="99"
          value="1"
        />
      </div>
    </section>

  </div>

  <script src="popup.js"></script>
</body>
</html>
